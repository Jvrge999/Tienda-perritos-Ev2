name: Deploy Tienda Perritos

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-frontend:latest ./front_despacho
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend-despachos:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend-ventas:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-frontend:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            sudo /usr/local/bin/docker-compose pull
            sudo /usr/local/bin/docker-compose up -d